<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sample Mail</title>
        <link rel="icon" type="image/png" href="./favicon.png" />
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

            :root {
                --bg: #fafafa;
                --bg-grid: rgba(0, 0, 0, 0.035);
                --ink: #111111;
                --ink-muted: #666666;
                --line: #e5e5e5;
                --line-strong: #d4d4d4;
                --panel: #ffffff;
                --button: #111111;
                --button-hover: #000000;
                --danger: #b42318;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                color: var(--ink);
                font-family: 'Plus Jakarta Sans', sans-serif;
                background:
                    linear-gradient(var(--bg-grid) 1px, transparent 1px),
                    linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px), var(--bg);
                background-size:
                    20px 20px,
                    20px 20px,
                    auto;
                min-height: 100vh;
            }

            .shell {
                max-width: 880px;
                margin: 0 auto;
                padding: 34px 18px 48px;
            }

            h1 {
                margin: 0;
                font-size: clamp(1.5rem, 1.6vw + 1rem, 2.25rem);
                letter-spacing: -0.02em;
                font-weight: 700;
            }

            .sub {
                margin: 10px 0 0;
                color: var(--ink-muted);
                font-size: 0.95rem;
            }

            .header {
                display: flex;
                align-items: center;
            }
            .github-link {
                display: flex;
                align-items: center;
                color: var(--ink);
                margin-left: 10px;
                transition:
                    opacity 120ms ease,
                    transform 120ms ease;
            }

            .github-link:hover {
                opacity: 0.7;
                transform: scale(1.1);
            }

            .panel {
                margin-top: 20px;
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 14px;
                padding: 18px;
                box-shadow: 0 8px 28px rgba(0, 0, 0, 0.06);
            }

            .grid {
                display: grid;
                grid-template-columns: 1fr;
                gap: 12px;
            }

            @media (min-width: 860px) {
                .grid {
                    grid-template-columns: 1fr 1fr;
                }
            }

            details.advanced {
                margin-top: 12px;
                border: 1px solid var(--line);
                border-radius: 10px;
                padding: 8px 10px;
                background: #fcfcfc;
            }

            details.advanced summary {
                cursor: pointer;
                color: #4f4f4f;
                font-size: 0.9rem;
                user-select: none;
            }

            details.advanced .inner {
                margin-top: 10px;
            }

            label {
                display: block;
                font-size: 0.86rem;
                color: #505050;
                margin-bottom: 6px;
            }

            input {
                width: 100%;
                padding: 10px 11px;
                border: 1px solid var(--line);
                border-radius: 10px;
                background: #ffffff;
                color: var(--ink);
                outline: none;
                font-size: 0.95rem;
                transition:
                    border-color 120ms ease,
                    box-shadow 120ms ease;
            }

            input:focus {
                border-color: var(--line-strong);
                box-shadow: 0 0 0 3px rgba(17, 17, 17, 0.08);
            }

            .actions {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                margin-top: 12px;
            }

            button {
                border: 1px solid #000;
                border-radius: 10px;
                padding: 10px 14px;
                font-weight: 600;
                font-family: 'Plus Jakarta Sans', sans-serif;
                cursor: pointer;
                background: var(--button);
                color: #fff;
                transition:
                    transform 120ms ease,
                    background 120ms ease,
                    border-color 120ms ease;
            }

            button:hover {
                transform: translateY(-1px);
                background: var(--button-hover);
            }

            button.secondary {
                background: #fff;
                color: #111;
                border-color: var(--line-strong);
            }

            .status {
                margin-top: 12px;
                padding: 10px 11px;
                border-radius: 10px;
                border: 1px solid var(--line);
                background: #fcfcfc;
                color: var(--ink-muted);
                font-size: 0.92rem;
                min-height: 42px;
                display: flex;
                align-items: center;
            }

            .status.err {
                color: var(--danger);
                border-color: #efc7c3;
                background: #fff8f7;
            }

            .emails {
                margin-top: 16px;
                display: grid;
                gap: 10px;
                min-width: 0;
            }

            .sponsor {
                margin-top: 14px;
                margin-bottom: 10px;
                border-top: 1px dashed var(--line);
                padding-top: 10px;
            }

            .sponsor-mark {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                margin-bottom: 8px;
                color: #6b6b6b;
                font-size: 0.74rem;
                letter-spacing: 0.04em;
                text-transform: uppercase;
            }

            .sponsor-mark svg {
                width: 14px;
                height: 14px;
                display: block;
                stroke: #7a7a7a;
            }

            .sponsor-list {
                display: grid;
                gap: 8px;
                min-width: 0;
            }

            .sponsor-item {
                width: 100%;
                max-width: 100%;
                min-width: 0;
                overflow: hidden;
                border: 1px solid var(--line);
                border-radius: 10px;
                background: #fff;
                padding: 9px;
                animation: fadeIn 260ms ease;
            }

            .sponsor-item .row {
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                justify-content: space-between;
                gap: 10px;
                min-width: 0;
            }

            .sponsor-item .name {
                min-width: 0;
                font-size: 0.74rem;
                color: #7a7a7a;
                margin: 0;
                text-transform: uppercase;
                letter-spacing: 0.04em;
                font-weight: 500;
                overflow-wrap: anywhere;
                word-break: break-word;
            }

            .sponsor-item .hash {
                margin: 7px 0 0;
                font-family: 'IBM Plex Mono', monospace;
                font-size: 0.8rem;
                line-height: 1.45;
                word-break: break-all;
                background: #fcfcfc;
                border: 1px solid #ededed;
                border-radius: 8px;
                padding: 7px;
                color: #404040;
            }

            .copy-btn {
                flex-shrink: 0;
                max-width: 100%;
                border: 1px solid #e1e1e1;
                border-radius: 8px;
                background: #fff;
                color: #5f5f5f;
                padding: 6px 9px;
                font-size: 0.72rem;
                font-weight: 500;
                cursor: pointer;
                transition:
                    transform 120ms ease,
                    background 120ms ease;
                white-space: nowrap;
            }

            .copy-btn:hover {
                transform: translateY(-1px);
                background: #f8f8f8;
            }

            .sponsor-empty {
                margin: 0;
                color: #777;
                font-size: 0.8rem;
                border: 1px dashed #e8e8e8;
                border-radius: 10px;
                background: #fcfcfc;
                padding: 8px;
            }

            .mail {
                width: 100%;
                max-width: 100%;
                min-width: 0;
                overflow: hidden;
                border: 1px solid var(--line);
                background: #fff;
                border-radius: 12px;
                padding: 12px;
                animation: fadeIn 260ms ease;
                display: grid;
                gap: 10px;
            }

            .mail-head {
                display: flex;
                flex-wrap: wrap;
                align-items: flex-start;
                justify-content: space-between;
                gap: 8px 12px;
                min-width: 0;
            }

            .mail-title-wrap {
                flex: 1 1 280px;
                min-width: 0;
            }

            .mail h3 {
                margin: 0;
                font-size: 1rem;
                line-height: 1.4;
                overflow-wrap: anywhere;
                word-break: break-word;
            }

            .mail-time {
                flex: 0 1 auto;
                max-width: 100%;
                min-width: 0;
                padding: 4px 8px;
                border: 1px solid var(--line);
                border-radius: 999px;
                background: #fcfcfc;
                color: var(--ink-muted);
                font-size: 0.78rem;
                line-height: 1.4;
                overflow-wrap: anywhere;
                word-break: break-word;
            }

            .mail-meta {
                display: grid;
                gap: 6px;
                min-width: 0;
            }

            .mail-meta-row {
                display: grid;
                grid-template-columns: 44px minmax(0, 1fr);
                gap: 8px;
                min-width: 0;
                align-items: start;
            }

            .mail-meta-label {
                color: #7a7a7a;
                font-size: 0.78rem;
                text-transform: uppercase;
                letter-spacing: 0.04em;
                line-height: 1.5;
            }

            .mail-meta-value {
                min-width: 0;
                color: var(--ink-muted);
                font-size: 0.85rem;
                line-height: 1.5;
                overflow-wrap: anywhere;
                word-break: break-word;
            }

            .txt-wrapper {
                position: relative;
            }

            .txt,
            .html-view {
                margin: 0;
                padding: 10px;
                white-space: pre-wrap;
                line-height: 1.45;
                font-size: 0.92rem;
                font-family: 'IBM Plex Mono', monospace;
                color: #1f1f1f;
                min-height: 100px;
                max-height: 30em;
                overflow: auto;
                overflow-wrap: anywhere;
                word-break: break-word;
                background: #fcfcfc;
                border: 1px solid #ededed;
                border-radius: 10px;
            }

            .copy-raw-btn {
                position: absolute;
                top: 8px;
                right: 8px;
                width: 28px;
                height: 28px;
                padding: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(255, 255, 255, 0.85);
                backdrop-filter: blur(2px);
                border: 1px solid #ddd;
                border-radius: 6px;
                cursor: pointer;
                opacity: 0;
                transition: all 180ms ease;
                z-index: 10;
                box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            }

            .txt-wrapper:hover .copy-raw-btn {
                opacity: 1;
            }

            .copy-raw-btn:hover {
                background: #fff;
                border-color: #bbb;
                transform: translateY(-1px);
            }

            .copy-raw-btn svg {
                width: 14px;
                height: 14px;
                stroke: #555;
                fill: none;
            }

            .html-view {
                padding: 0;
                background: #fff;
                display: block;
                border: 1px solid #ededed;
            }

            .html-view iframe {
                width: 100%;
                height: 30em;
                border: none;
                display: block;
                border-radius: 10px;
            }

            .mail-content-toolbar {
                display: flex;
                justify-content: flex-end;
                gap: 6px;
                margin-bottom: 4px;
            }

            .toggle-btn {
                appearance: none;
                background: #f1f1f1;
                border: 1px solid #e1e1e1;
                border-radius: 6px;
                padding: 4px 10px;
                font-size: 0.72rem;
                font-weight: 600;
                color: #666;
                cursor: pointer;
                transition: all 120ms ease;
            }

            .toggle-btn.active {
                background: var(--button);
                color: #fff;
                border-color: #000;
            }

            .toggle-btn:hover:not(.active) {
                background: #e5e5e5;
            }

            @media (max-width: 540px) {
                .mail-meta-row {
                    grid-template-columns: 1fr;
                    gap: 2px;
                }
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(4px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        </style>
    </head>
    <body>
        <main class="shell">
            <div class="header">
                <h1>Sample Mail</h1>
                <a
                    href="https://github.com/bestK/sample-mail"
                    target="_blank"
                    class="github-link"
                    aria-label="GitHub Repository"
                >
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"
                        />
                    </svg>
                </a>
            </div>
            <p class="sub">Secure and effortless temporary email solution.</p>

            <section class="panel">
                <div>
                    <div>
                        <label for="address">Email Address</label>
                        <input id="address" placeholder="example@your-domain.com" />
                    </div>
                </div>

                <details class="advanced">
                    <summary>Advanced: API Base URL</summary>
                    <div class="inner">
                        <input id="apiBase" placeholder="https://your-api.example.com" />
                    </div>
                </details>

                <div class="actions">
                    <button id="createBtn">Generate Inbox</button>
                    <button id="fetchBtn" class="secondary">Check New Mail</button>
                </div>

                <div id="status" class="status">Inbox is ready.</div>
                <div id="emails" class="emails"></div>

                <section class="sponsor">
                    <div class="sponsor-mark" aria-label="sponsor">
                        <svg
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke-width="1.8"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            aria-hidden="true"
                        >
                            <path d="M4 8h12v5a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V8z"></path>
                            <path d="M16 10h2a2 2 0 1 1 0 4h-2"></path>
                            <path d="M7 5c0-1 1-2 2-2"></path>
                            <path d="M11 5c0-1 1-2 2-2"></path>
                        </svg>
                        Sponsor
                    </div>
                    <div id="sponsorList" class="sponsor-list"></div>
                </section>
            </section>
        </main>

        <script>
            const els = {
                apiBase: document.getElementById('apiBase'),
                address: document.getElementById('address'),
                createBtn: document.getElementById('createBtn'),
                fetchBtn: document.getElementById('fetchBtn'),
                status: document.getElementById('status'),
                emails: document.getElementById('emails'),
                sponsorList: document.getElementById('sponsorList'),
            };

            const POLL_INTERVAL_MS = 3000;
            let pollingTimer = null;
            let autoFetching = false;
            let lastRenderedSignature = null;

            const defaultBase = window.location.origin;
            const savedBase = localStorage.getItem('apiBase') || defaultBase;
            els.apiBase.value = savedBase;

            const savedAddress = localStorage.getItem('lastEmailAddress') || '';
            els.address.value = savedAddress;

            function normalizeBase(raw) {
                return raw.trim().replace(/\/$/, '');
            }

            function setStatus(text, isError) {
                els.status.textContent = text;
                els.status.classList.toggle('err', Boolean(isError));
            }

            function setBusy(busy) {
                els.createBtn.disabled = busy;
                els.fetchBtn.disabled = busy;
            }

            function getBase() {
                const base = normalizeBase(els.apiBase.value || defaultBase);
                localStorage.setItem('apiBase', base);
                return base;
            }

            function getClientTimeZone() {
                try {
                    return Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';
                } catch (_) {
                    return 'UTC';
                }
            }

            function withClientTimeZone(path) {
                const timeZone = getClientTimeZone();
                if (!timeZone) return path;
                const separator = path.includes('?') ? '&' : '?';
                return path + separator + 'timezone=' + encodeURIComponent(timeZone);
            }

            async function apiGet(path) {
                const base = getBase();
                const res = await fetch(base + path, { method: 'GET' });
                let body = null;
                try {
                    body = await res.json();
                } catch (_) {
                    body = null;
                }

                if (!res.ok || !body || body.success === false) {
                    const msg = body && body.error ? body.error : 'Request failed: ' + res.status;
                    throw new Error(msg);
                }

                return body;
            }

            function clearEmails() {
                els.emails.innerHTML = '';
            }

            function renderSponsorChannels(channels) {
                els.sponsorList.innerHTML = '';

                if (!Array.isArray(channels) || channels.length === 0) {
                    const empty = document.createElement('p');
                    empty.className = 'sponsor-empty';
                    empty.textContent = 'No sponsor channel configured.';
                    els.sponsorList.appendChild(empty);
                    return;
                }

                const frag = document.createDocumentFragment();
                for (const channel of channels) {
                    const card = document.createElement('article');
                    card.className = 'sponsor-item';

                    const name = document.createElement('p');
                    name.className = 'name';
                    name.textContent =
                        channel.name || (channel.currency ? channel.currency + ' Transfer' : 'Sponsor Channel');

                    const copyBtn = document.createElement('button');
                    copyBtn.className = 'copy-btn';
                    copyBtn.type = 'button';
                    copyBtn.textContent = 'Copy Address';

                    copyBtn.addEventListener('click', async () => {
                        const value = channel.receive_hash || '';
                        if (!value) return;
                        try {
                            await navigator.clipboard.writeText(value);
                            copyBtn.textContent = 'Copied';
                            setTimeout(() => {
                                copyBtn.textContent = 'Copy Address';
                            }, 1200);
                        } catch (_) {
                            copyBtn.textContent = 'Copy Failed';
                            setTimeout(() => {
                                copyBtn.textContent = 'Copy Address';
                            }, 1200);
                        }
                    });

                    const hash = document.createElement('p');
                    hash.className = 'hash';
                    hash.textContent = channel.receive_hash || '-';

                    const row = document.createElement('div');
                    row.className = 'row';
                    row.appendChild(name);
                    row.appendChild(copyBtn);

                    card.appendChild(row);
                    card.appendChild(hash);
                    frag.appendChild(card);
                }

                els.sponsorList.appendChild(frag);
            }

            async function loadSponsorInfo() {
                try {
                    const body = await apiGet('/sponsor/info');
                    const channels = body && body.data ? body.data.channels : [];
                    renderSponsorChannels(channels || []);
                } catch (_) {
                    renderSponsorChannels([]);
                }
            }

            function buildSignature(items) {
                if (!Array.isArray(items)) return '[]';
                return items.map(item => [item.createdAt, item.subject, item.from, item.to].join('|')).join('||');
            }

            function createMailMetaRow(label, value) {
                const row = document.createElement('div');
                row.className = 'mail-meta-row';

                const labelEl = document.createElement('span');
                labelEl.className = 'mail-meta-label';
                labelEl.textContent = label;

                const valueEl = document.createElement('span');
                valueEl.className = 'mail-meta-value';
                valueEl.textContent = value || '-';

                row.appendChild(labelEl);
                row.appendChild(valueEl);
                return row;
            }

            function renderMailBody(item, mode) {
                if (mode === 'html' && item.html) {
                    const container = document.createElement('div');
                    container.className = 'html-view';
                    const iframe = document.createElement('iframe');
                    // Sandbox for safety: allow-same-origin is needed for srcdoc sometimes but use caution
                    iframe.sandbox = 'allow-popups allow-popups-to-escape-sandbox';
                    iframe.srcdoc = `
          <!DOCTYPE html>
          <html>
            <head>
              <base target="_blank">
              <style>
                body {
                  margin: 12px;
                  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                  line-height: 1.5;
                  color: #111;
                }
                img { max-width: 100%; height: auto; }
              </style>
            </head>
            <body>${item.html}</body>
          </html>
        `;
                    container.appendChild(iframe);
                    return container;
                }

                const wrapper = document.createElement('div');
                wrapper.className = 'txt-wrapper';

                const textVal = item.text || item.html || '(No content)';
                const text = document.createElement('p');
                text.className = 'txt';
                text.textContent = textVal;

                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-raw-btn';
                copyBtn.type = 'button';
                copyBtn.title = 'Copy raw text';
                copyBtn.innerHTML = `
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </svg>
      `;

                copyBtn.onclick = async () => {
                    try {
                        await navigator.clipboard.writeText(textVal);
                        copyBtn.innerHTML = `
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="stroke: #059669;">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          `;
                        setTimeout(() => {
                            copyBtn.innerHTML = `
              <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
            `;
                        }, 1500);
                    } catch (_) {
                        // ignore
                    }
                };

                wrapper.appendChild(text);
                wrapper.appendChild(copyBtn);
                return wrapper;
            }

            function renderEmails(items) {
                lastRenderedSignature = buildSignature(items);
                clearEmails();
                if (!Array.isArray(items) || items.length === 0) {
                    setStatus('No mail yet for this inbox.', false);
                    return;
                }

                const frag = document.createDocumentFragment();
                for (const item of items) {
                    const card = document.createElement('article');
                    card.className = 'mail';

                    const head = document.createElement('div');
                    head.className = 'mail-head';

                    const titleWrap = document.createElement('div');
                    titleWrap.className = 'mail-title-wrap';

                    const title = document.createElement('h3');
                    title.textContent = item.subject || '(No subject)';

                    const time = document.createElement('div');
                    time.className = 'mail-time';
                    time.textContent = item.createdAt || '-';

                    titleWrap.appendChild(title);
                    head.appendChild(titleWrap);
                    head.appendChild(time);

                    const meta = document.createElement('div');
                    meta.className = 'mail-meta';
                    meta.appendChild(createMailMetaRow('From', item.from || '-'));
                    meta.appendChild(createMailMetaRow('To', item.to || '-'));
                    if (item.forwarded_to) {
                        meta.appendChild(createMailMetaRow('Forwarded-To', item.forwarded_to));
                    }

                    // Content Area
                    const contentWrap = document.createElement('div');
                    contentWrap.className = 'mail-content';

                    const toolbar = document.createElement('div');
                    toolbar.className = 'mail-content-toolbar';

                    const btnHtml = document.createElement('button');
                    btnHtml.className = 'toggle-btn';
                    btnHtml.textContent = 'HTML';
                    const btnRaw = document.createElement('button');
                    btnRaw.className = 'toggle-btn';
                    btnRaw.textContent = 'Raw';

                    let currentMode = item.html ? 'html' : 'raw';
                    if (currentMode === 'html') btnHtml.classList.add('active');
                    else btnRaw.classList.add('active');

                    const bodyContainer = document.createElement('div');
                    bodyContainer.appendChild(renderMailBody(item, currentMode));

                    const updateView = mode => {
                        if (currentMode === mode) return;
                        currentMode = mode;
                        btnHtml.classList.toggle('active', mode === 'html');
                        btnRaw.classList.toggle('active', mode === 'raw');
                        bodyContainer.innerHTML = '';
                        bodyContainer.appendChild(renderMailBody(item, mode));
                    };

                    btnHtml.onclick = () => updateView('html');
                    btnRaw.onclick = () => updateView('raw');

                    if (item.html) toolbar.appendChild(btnHtml);
                    toolbar.appendChild(btnRaw);

                    contentWrap.appendChild(toolbar);
                    contentWrap.appendChild(bodyContainer);

                    card.appendChild(head);
                    card.appendChild(meta);
                    card.appendChild(contentWrap);
                    frag.appendChild(card);
                }

                els.emails.appendChild(frag);
                setStatus('Showing ' + items.length + ' messages.', false);
            }

            async function onCreateAddress() {
                try {
                    setBusy(true);
                    setStatus('Creating a new inbox...', false);
                    const body = await apiGet('/email/create');
                    const addr = body && body.data ? body.data.address : '';
                    if (!addr) throw new Error('No address returned by API.');
                    els.address.value = addr;
                    localStorage.setItem('lastEmailAddress', addr);
                    lastRenderedSignature = null;
                    clearEmails();
                    setStatus('New inbox is ready: ' + addr, false);
                } catch (err) {
                    setStatus(err.message || String(err), true);
                } finally {
                    setBusy(false);
                }
            }

            async function onFetchEmails() {
                try {
                    const addr = els.address.value.trim();
                    if (!addr) throw new Error('Please fill in email address first.');

                    setBusy(true);
                    setStatus('Checking for new mail...', false);
                    const body = await apiGet(withClientTimeZone('/email/' + encodeURIComponent(addr) + '?limit=10'));
                    renderEmails(body.data || []);
                } catch (err) {
                    clearEmails();
                    setStatus(err.message || String(err), true);
                } finally {
                    setBusy(false);
                }
            }

            function startAutoPolling() {
                if (pollingTimer) return;

                pollingTimer = setInterval(async () => {
                    const addr = els.address.value.trim();
                    if (!addr || autoFetching) return;

                    try {
                        autoFetching = true;
                        const body = await apiGet(
                            withClientTimeZone('/email/' + encodeURIComponent(addr) + '?limit=10'),
                        );
                        const items = body.data || [];
                        const nextSignature = buildSignature(items);
                        if (nextSignature !== lastRenderedSignature) {
                            renderEmails(items);
                        }
                    } catch (err) {
                        setStatus(err.message || String(err), true);
                    } finally {
                        autoFetching = false;
                    }
                }, POLL_INTERVAL_MS);
            }

            els.createBtn.addEventListener('click', onCreateAddress);
            els.fetchBtn.addEventListener('click', onFetchEmails);
            els.apiBase.addEventListener('change', loadSponsorInfo);
            els.address.addEventListener('input', () => {
                localStorage.setItem('lastEmailAddress', els.address.value.trim());
            });
            startAutoPolling();
            loadSponsorInfo();
        </script>
    </body>
</html>
